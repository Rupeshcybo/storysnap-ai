<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StorySnap AI</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        background: #0f0a1e;
        color: white;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0f0a1e 0%, #1a0a2e 50%, #0f0a1e 100%);
        z-index: 9999;
        gap: 20px;
        transition: opacity 0.4s ease;
      }
      #splash.hide {
        opacity: 0;
        pointer-events: none;
      }
      .splash-logo {
        width: 80px;
        height: 80px;
        border-radius: 22px;
        background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 38px;
        box-shadow: 0 0 60px rgba(168,85,247,0.6), 0 0 120px rgba(168,85,247,0.2);
        animation: pulse 1.5s ease-in-out infinite;
      }
      .splash-title {
        font-size: 26px;
        font-weight: 700;
        letter-spacing: -0.5px;
        color: white;
      }
      .splash-title span {
        background: linear-gradient(90deg, #818cf8, #c084fc, #f472b6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .splash-sub {
        font-size: 14px;
        color: rgba(255,255,255,0.5);
        margin-top: -8px;
      }
      .splash-dots {
        display: flex;
        gap: 10px;
        margin-top: 12px;
      }
      .splash-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #a855f7;
        animation: bounce 1.2s ease-in-out infinite;
        opacity: 0.6;
      }
      .splash-dot:nth-child(2) { animation-delay: 0.2s; }
      .splash-dot:nth-child(3) { animation-delay: 0.4s; }
      #splash-refresh {
        display: none;
        margin-top: 16px;
        padding: 10px 24px;
        border-radius: 12px;
        background: linear-gradient(135deg, #6366f1, #a855f7);
        color: white;
        font-size: 15px;
        font-weight: 600;
        border: none;
        cursor: pointer;
        box-shadow: 0 4px 20px rgba(168,85,247,0.4);
      }
      #splash-refresh:active { opacity: 0.8; }
      @keyframes pulse {
        0%, 100% { transform: scale(1); box-shadow: 0 0 60px rgba(168,85,247,0.6); }
        50% { transform: scale(1.06); box-shadow: 0 0 80px rgba(168,85,247,0.8); }
      }
      @keyframes bounce {
        0%, 80%, 100% { transform: translateY(0); opacity: 0.6; }
        40% { transform: translateY(-12px); opacity: 1; background: #c084fc; }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="splash-logo">⚡</div>
      <div class="splash-title">StorySnap <span>AI</span></div>
      <div class="splash-sub">Loading your experience...</div>
      <div class="splash-dots">
        <div class="splash-dot"></div>
        <div class="splash-dot"></div>
        <div class="splash-dot"></div>
      </div>
      <button id="splash-refresh" onclick="location.reload()">Tap to Refresh</button>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.__hideSplash = function() {
        var s = document.getElementById('splash');
        if (s) {
          s.classList.add('hide');
          setTimeout(function() { s.style.display = 'none'; }, 450);
        }
      };
      // Show refresh button after 20s if app hasn't loaded
      setTimeout(function() {
        var s = document.getElementById('splash');
        var btn = document.getElementById('splash-refresh');
        if (s && !s.classList.contains('hide') && btn) {
          btn.style.display = 'block';
          var sub = s.querySelector('.splash-sub');
          if (sub) sub.textContent = 'Taking longer than usual...';
        }
      }, 20000);
    </script>
  </body>
</html>
